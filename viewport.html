<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极简图片素材搜索器</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 600px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #ddd;
            border-radius: 25px;
            outline: none;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
        }

        button {
            padding: 12px 25px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: opacity 0.3s;
        }

        button:hover {
            opacity: 0.9;
        }

        .api-config {
            font-size: 12px;
            color: #666;
            margin-bottom: 20px;
        }

        #image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        .img-card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
            position: relative;
        }

        .img-card:hover {
            transform: translateY(-5px);
        }

        .img-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }

        .img-info {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .img-info span {
            font-size: 14px;
            color: #555;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 120px;
        }

        .download-btn {
            background-color: #27ae60;
            padding: 5px 12px;
            font-size: 12px;
            text-decoration: none;
            border-radius: 4px;
        }

        .loading {
            display: none;
            margin: 20px;
            font-style: italic;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>图片素材展示器</h1>
        <p>基于 Unsplash 公共库</p>
    </div>

    <div class="api-config">
        <!-- 提示：在下方的 JS 中填入你的 Access Key -->
        <span id="key-status">状态: 请确保代码中已填入 API Key</span>
    </div>

    <div class="search-box">
        <input type="text" id="search-input" placeholder="输入关键词 (例如: Nature, Coffee...)" onkeypress="handleKeyPress(event)">
        <button onclick="searchImages()">搜索</button>
    </div>

    <div class="loading" id="loading">正在努力加载中...</div>

    <div id="image-grid">
        <!-- 图片将显示在这里 -->
    </div>

    <script>
        /**
         * ！！！在此处填写你的 Unsplash Access Key ！！！
         * 获取地址: https://unsplash.com/developers
         */
        const ACCESS_KEY = 'YOUR_UNSPLASH_ACCESS_KEY_HERE'; 

        const searchInput = document.getElementById('search-input');
        const imageGrid = document.getElementById('image-grid');
        const loading = document.getElementById('loading');

        async function searchImages() {
            const query = searchInput.value.trim();
            if (!query) return alert('请输入搜索关键词');
            
            if (ACCESS_KEY === 'YOUR_UNSPLASH_ACCESS_KEY_HERE') {
                alert('请先在代码中填入你的 Unsplash Access Key！');
                return;
            }

            // 显示加载状态
            loading.style.display = 'block';
            imageGrid.innerHTML = '';

            try {
                const response = await fetch(`https://api.unsplash.com/search/photos?query=${query}&per_page=20&client_id=${ACCESS_KEY}`);
                const data = await response.json();

                if (data.results.length === 0) {
                    imageGrid.innerHTML = '<p>没有找到相关图片</p>';
                } else {
                    displayImages(data.results);
                }
            } catch (error) {
                console.error('搜索出错:', error);
                alert('获取图片失败，请检查网络或 API Key 是否有效。');
            } finally {
                loading.style.display = 'none';
            }
        }

        function displayImages(images) {
            images.forEach(img => {
                const card = document.createElement('div');
                card.className = 'img-card';

                card.innerHTML = `
                    <img src="${img.urls.small}" alt="${img.alt_description}">
                    <div class="img-info">
                        <span>by ${img.user.name}</span>
                        <a href="${img.links.download}&force=true" target="_blank" class="download-btn" rel="noopener noreferrer">下载</a>
                    </div>
                `;
                imageGrid.appendChild(card);
            });
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                searchImages();
            }
        }

        // 初始状态检查
        if (ACCESS_KEY !== 'YOUR_UNSPLASH_ACCESS_KEY_HERE') {
            document.getElementById('key-status').innerText = '状态: API Key 已配置';
            document.getElementById('key-status').style.color = 'green';
        }
    </script>
</body>
</html>
